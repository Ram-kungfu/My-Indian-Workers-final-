<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वर्कर हाजिरी - My Indian Karigar</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 30px 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        
        /* कैमरा आइकन बटन स्टाइल */
        .camera-trigger {
            background: #34495e;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .camera-trigger:active { transform: scale(0.9); }
        
        button { width: 90%; padding: 15px; margin: 10px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; opacity: 0.6; }
        .btn-in { background: #27ae60; }
        .btn-out { background: #e67e22; }
        
        /* जब फोटो खिंच जाए तब बटन चमकेंगे */
        .ready { opacity: 1 !important; transform: scale(1.02); }
        
        #statusMessage { margin-top: 15px; font-weight: bold; min-height: 20px; font-size: 14px; }
        #preview { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; margin: 10px auto; border: 2px solid #27ae60; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛠️ वर्कर अटेंडेंस</h2>
    <p> 1.पहले कैमरा दबाकर  फोटो खींचें।</p>
    
    <div class="camera-trigger" onclick="triggerCamera()">
        <span style="font-size: 35px;">📷</span>
    </div>
    
    <img id="preview" src="" alt="Worker Photo">
    
    <div style="background:white; padding:20px; border-radius:15px; box-shadow:0 4px 8px rgba(0,0,0,0.1); text-align: center;">
      
       अथवा नीचे जीपीएस कैमरा द्वारा खिचा हुआ  फोटो  अपलोड करें।
      
    <h3>📸 फोटो अपलोड / हाजिरी</h3>
    
    <input type="file" id="attendanceFile" accept="image/*" style="display: none;" onchange="showPreview(this)">

<div onclick="document.getElementById('attendanceFile').click()" style="cursor:pointer; margin-bottom: 20px;">
    <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" width="60" alt="Camera">
    <p style="font-size: 12px; color: gray;">फोटो चुनें या खींचें</p>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="camera" style="display: none;" onchange="showPreview(this)">


    
    
    <button id="btnIn" class="btn-in" onclick="processAttendance('In')" disabled>📸 पहुँच गया (Check In)</button>
    
    घर जाते समय काम खत्म वाले बटन पर  फोटो अपलोड करके हाजिरी लगाएं।
    
    <button id="btnOut" class="btn-out" onclick="processAttendance('Out')" disabled>📸 काम खत्म (Check Out)</button>
    
    <div id="statusMessage"></div>
    
    <br><br>
    <a href="index.html" style="color: #777; text-decoration: none;">← वापस जाएं</a>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuNgvUNcDQXt-D4JfazMY8VZG9tRVAnYv-rTtdfoXKDysRLbSK8ut3lKSnb5ihYJfl/exec";
let photoTaken = false;

// 1. कैमरा खोलना
function triggerCamera() {
    document.getElementById("cameraInput").click();
}

// 2. फोटो खींचने के बाद बटनों को सक्रिय (Enable) करना
let selectedFile = null; // फोटो डेटा स्टोर करने के लिए

function showPreview(input) {
    const file = input.files[0];
    const preview = document.getElementById("preview");
    const btnIn = document.getElementById("btnIn");
    const btnOut = document.getElementById("btnOut");
    const statusDiv = document.getElementById("statusMessage");

    if (file) {
        selectedFile = file; // फाइल को ग्लोबल वेरिएबल में रखें
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = "block";
            
            // बटनों को एक्टिव करें
            photoTaken = true;
            btnIn.disabled = false;
            btnOut.disabled = false;
            btnIn.classList.add("ready");
            btnOut.classList.add("ready");
            
            statusDiv.innerHTML = "✅ फोटो मिल गई! अब हाजिरी लगायें।";
            statusDiv.style.color = "green";
        }
        reader.readAsDataURL(file);
    }
}


// 3. डेटा भेजना
function processAttendance(type) {
    if (!photoTaken) {
        alert("पहले ऊपर वाले कैमरा आइकन पर क्लिक करके फोटो लें!");
        return;
    }

    const statusDiv = document.getElementById("statusMessage");
    const btnIn = document.getElementById("btnIn");
    const btnOut = document.getElementById("btnOut");

    statusDiv.style.color = "blue";
    statusDiv.innerHTML = "⏳ हाजिरी दर्ज हो रही है...";
    btnIn.disabled = true;
    btnOut.disabled = true;

    const data = {
        userType: 'attendance',
        status: (type === 'In' ? 'Check In' : 'Check Out'),
        timestamp: new Date().toLocaleString()
    };

    fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', 
        body: JSON.stringify(data)
    })
    .then(() => {
        statusDiv.style.color = "green";
        statusDiv.innerHTML = "✅ " + (type === 'In' ? 'Check In' : 'Check Out') + " सफल रहा!";
        alert("बधाई हो! आपकी हाजिरी दर्ज हो गई है।");
        
        // फॉर्म रीसेट करें
        location.reload(); 
    })
    .catch(err => {
        statusDiv.style.color = "red";
        statusDiv.innerHTML = "❌ एरर: दोबारा कोशिश करें।";
        btnIn.disabled = false;
        btnOut.disabled = false;
    });
}
</script>

</body>
</html>
